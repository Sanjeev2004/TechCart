version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: ecomm_mongodb
    ports:
      - "27017:27017"
    volumes:
      - ecomm_mongo_data:/data/db
    networks:
      - ecomm-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecomm_backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - ecomm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecomm_frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ecomm-network

networks:
  ecomm-network:
    driver: bridge

volumes:
  ecomm_mongo_data:
